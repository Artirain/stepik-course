name: Quality Checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Build MkDocs (strict)
        run: mkdocs build --strict

      - name: Link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,206,429
            --max-retries 2
            --exclude-path site
            --exclude 127.0.0.1
            --exclude claude.ai/code
            "**/*.md"
